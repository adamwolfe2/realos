<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <rect width="600" height="320" fill="#FFFFFF"/>
  <!-- swatch row -->
  <rect x="32"  y="32" width="80" height="80" fill="#FFFFFF"      stroke="#E5E5E5"/>
  <rect x="120" y="32" width="80" height="80" fill="#000000"/>
  <rect x="208" y="32" width="80" height="80" fill="#666666"/>
  <rect x="296" y="32" width="80" height="80" fill="#333333"/>
  <rect x="384" y="32" width="80" height="80" fill="#F4F4F4" stroke="#E5E5E5"/>
  <rect x="472" y="32" width="80" height="80" fill="#CCCCCC"/>
  <!-- sample type -->
  <text x="32" y="158" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#000000">Stark Monochrome</text>
  <text x="32" y="190" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#333333">Pure white + pure black + a single grayscale ramp. Maximum editorial discipline.</text>
  <text x="32" y="218" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#888888">stark-monochrome · light-monochrome</text>
  <!-- footer rule + sample hex -->
  <line x1="32" y1="252" x2="568" y2="252" stroke="#E5E5E5" stroke-width="1"/>
  <text x="32"  y="284" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#888888">bg #FFFFFF</text>
  <text x="160" y="284" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#888888">primary #000000</text>
  <text x="332" y="284" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#888888">accent #666666</text>
</svg>
