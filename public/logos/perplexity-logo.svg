<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Perplexity">
  <title>Perplexity</title>
  <!-- Perplexity's geometric mark — stroked teal asterisk with chevron
       arrows pointing inward from each cardinal direction. Reconstructed
       from the canonical brand glyph (rebuilt May 2026). -->
  <g fill="none" stroke="#1FB8CD" stroke-width="32" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Outer chevron arrows pointing toward centre, one per cardinal side -->
    <!-- Top chevron (down-pointing) -->
    <path d="M 96 64 L 256 224 L 416 64" />
    <!-- Bottom chevron (up-pointing) -->
    <path d="M 96 448 L 256 288 L 416 448" />
    <!-- Left chevron (right-pointing) -->
    <path d="M 64 96 L 224 256 L 64 416" />
    <!-- Right chevron (left-pointing) -->
    <path d="M 448 96 L 288 256 L 448 416" />

    <!-- Central asterisk: two diagonal lines and one vertical line
         crossing the centre to complete the snowflake-asterisk
         silhouette. -->
    <line x1="256" y1="64"  x2="256" y2="448" />
    <line x1="96"  y1="96"  x2="416" y2="416" />
    <line x1="416" y1="96"  x2="96"  y2="416" />
    <line x1="64"  y1="256" x2="448" y2="256" />
  </g>
</svg>
