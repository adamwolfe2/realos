       radiating from a small centre, each shaped like a tapered organic
       petal (wider in the middle, pointed at both ends). 11 rays at
       slightly randomised angles + lengths to preserve the hand-painted
       character; no symmetry. Reconstructed May 2026 from the brand
       reference. -->
