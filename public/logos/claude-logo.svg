    <!-- Tiny stub ray near bottom-left -->
    <path d="M 358 472 C 348 446 340 420 320 376 C 316 366 312 368 314 380 C 322 420 332 446 348 476 C 354 482 360 478 358 472 Z"/>
  </g>
</svg>
