<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Claude by Anthropic">
  <title>Claude</title>
  <!-- Anthropic's canonical asterisk-burst mark in their signature coral.
       Four longer cardinal petals (north/south/east/west) crossed by four
       shorter diagonal petals. Each petal is a rounded capsule pointing
       outward from the centre — the geometry Anthropic ships on
       anthropic.com and claude.ai. -->
  <g fill="#D97757">
    <!-- Cardinal petals -->
    <rect x="120" y="20" width="16" height="92" rx="8"/>
    <rect x="120" y="144" width="16" height="92" rx="8"/>
    <rect x="20" y="120" width="92" height="16" rx="8"/>
    <rect x="144" y="120" width="92" height="16" rx="8"/>
    <!-- Diagonal petals (rotated 45° around centre) -->
    <g transform="rotate(45 128 128)">
      <rect x="120" y="50" width="16" height="58" rx="8"/>
      <rect x="120" y="148" width="16" height="58" rx="8"/>
      <rect x="50" y="120" width="58" height="16" rx="8"/>
      <rect x="148" y="120" width="58" height="16" rx="8"/>
    </g>
  </g>
</svg>
